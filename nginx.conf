events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging formats and destinations
    access_log    /var/log/nginx/access.log;
    error_log     /var/log/nginx/error.log warn;

    # Performance optimizations
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    server {
        # Google Cloud Run expects the container to bind to port 8080
        listen       8080;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html;

        # Compression to improve load speed
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
        gzip_min_length 1000;

        location / {
            # Fallback for soft-routing SPA. Serves index.html if file isn't found
            try_files $uri $uri/ /index.html;
        }

        # Cache control for CSS and JS assets
        location ~* \.(?:css|js)$ {
            expires 7d;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }

        # Cache control for media/images
        location ~* \.(?:ico|gif|jpe?g|png|svg|woff2?|eot|ttf|otf)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }

        # Error page redirects
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
